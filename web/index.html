<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>LinkSnap</title>
  <style>
    :root {
      --bg: #0f1115;
      --panel: #161a22;
      --text: #e6e8eb;
      --muted: #8b95a3;
      --accent: #7ee787;
      --error: #ff7b72;
      --border: #2a2f3a;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font: 15px/1.5 system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      justify-content: center;
    }
    main {
      width: 100%;
      max-width: 560px;
      padding: 64px 24px;
    }
    h1 {
      margin: 0 0 4px;
      font-size: 32px;
      letter-spacing: -0.5px;
    }
    h1 span { color: var(--accent); }
    p.lead { margin: 0 0 32px; color: var(--muted); }

    form {
      display: flex;
      gap: 8px;
      margin-bottom: 24px;
    }
    input[type=url] {
      flex: 1;
      padding: 12px 14px;
      background: var(--panel);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 6px;
      font: inherit;
    }
    input[type=url]:focus {
      outline: none;
      border-color: var(--accent);
    }
    button {
      padding: 12px 18px;
      background: var(--accent);
      color: #0f1115;
      border: 0;
      border-radius: 6px;
      font: 600 inherit;
      cursor: pointer;
    }
    button:disabled { opacity: 0.5; cursor: not-allowed; }

    .result, .error {
      padding: 14px 16px;
      border-radius: 6px;
      margin-bottom: 24px;
      word-break: break-all;
    }
    .result {
      background: var(--panel);
      border: 1px solid var(--border);
    }
    .result a {
      color: var(--accent);
      text-decoration: none;
      font-weight: 600;
    }
    .result a:hover { text-decoration: underline; }
    .result .copy {
      float: right;
      background: transparent;
      color: var(--muted);
      padding: 2px 8px;
      font-size: 12px;
      border: 1px solid var(--border);
    }
    .copy.copied { color: var(--accent); }

    .error {
      background: rgba(255, 123, 114, 0.1);
      border: 1px solid var(--error);
      color: var(--error);
    }

    h2 {
      font-size: 13px;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--muted);
      margin: 32px 0 12px;
    }
    ul {
      list-style: none;
      padding: 0;
      margin: 0;
    }
    li {
      padding: 10px 0;
      border-top: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      gap: 16px;
    }
    li a { color: var(--accent); text-decoration: none; }
    li a:hover { text-decoration: underline; }
    li .original {
      color: var(--muted);
      font-size: 13px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      flex: 1;
    }
  </style>
</head>
<body>
  <main>
    <h1>link<span>snap</span></h1>
    <p class="lead">Paste a URL, get a shorter one.</p>

    <form id="form">
      <input id="url" type="url" required placeholder="https://example.com/some/long/path">
      <button id="btn">Snap</button>
    </form>

    <div id="output"></div>

    <h2>Recent</h2>
    <ul id="history"></ul>
  </main>

  <script>
    const form = document.getElementById('form');
    const input = document.getElementById('url');
    const btn = document.getElementById('btn');
    const output = document.getElementById('output');
    const historyEl = document.getElementById('history');

    const STORAGE_KEY = 'linksnap.history';

    function loadHistory() {
      try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; }
      catch { return []; }
    }

    function saveHistory(items) {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(items.slice(0, 8)));
    }

    function renderHistory() {
      const items = loadHistory();
      historyEl.innerHTML = items.map(item => `
        <li>
          <a href="${item.short}" target="_blank">${item.short.replace(/^https?:\/\//, '')}</a>
          <span class="original" title="${item.original}">${item.original}</span>
        </li>
      `).join('');
    }

    function showResult(short, original) {
      output.innerHTML = `
        <div class="result">
          <button class="copy" data-link="${short}">copy</button>
          <a href="${short}" target="_blank">${short}</a>
        </div>
      `;
    }

    function showError(msg) {
      output.innerHTML = `<div class="error">${msg}</div>`;
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      btn.disabled = true;
      output.innerHTML = '';

      try {
        const res = await fetch('/api/shorten', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ url: input.value.trim() }),
        });

        if (!res.ok) {
          const text = await res.text();
          showError(text.trim() || `request failed (${res.status})`);
          return;
        }

        const data = await res.json();
        showResult(data.short_url, input.value.trim());

        const history = loadHistory();
        history.unshift({ short: data.short_url, original: input.value.trim() });
        saveHistory(history);
        renderHistory();

        input.value = '';
      } catch (err) {
        showError('network error: ' + err.message);
      } finally {
        btn.disabled = false;
      }
    });

    output.addEventListener('click', async (e) => {
      const target = e.target.closest('.copy');
      if (!target) return;
      try {
        await navigator.clipboard.writeText(target.dataset.link);
        target.textContent = 'copied';
        target.classList.add('copied');
        setTimeout(() => {
          target.textContent = 'copy';
          target.classList.remove('copied');
        }, 1200);
      } catch {}
    });

    renderHistory();
  </script>
</body>
</html>
